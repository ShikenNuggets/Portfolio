cv:
  name: "Carter Rennick"
  location: "Toronto, ON, Canada"
  email: "carter.rennick@gmail.com"
  phone: "+16133298544"
  website: "https://gamesbycarter.vercel.app"
  social_networks:
    - network: "LinkedIn"
      username: "carterrrennick"
    - network: "GitHub"
      username: "ShikenNuggets"
  sections:
    Professional Summary:
      - "Generalist C++ developer with over 6 years of experience in game development and adjacent roles, with a focus on proprietary game engines and Unreal Engine 5. Proficient in procedural automation, gameplay programming, data tracking, and low-level subsystems such as skeletal animation and rendering. Proven experience collaborating with cross-discipline teams, optimizing production pipelines, and eliminating technical debt."
    experience:
      - company: "Clay Software Corporation"
        position: "Unreal Engine Software Developer"
        date:
        start_date: "2024-10"
        end_date: "present"
        location:
        summary:
        highlights:
          - "Consolidated disparate prototype functionality from Unreal Blueprints into organized, performant, and production-ready C++ plugins, allowing new features and bug fixes to be seamlessly rolled out to dozens of ArchViz projects."
          - "Built custom editor utilities and C++ automation tools to procedurally generate 3D environments based on client-provided 2D floorplans, significantly reducing setup time for new projects."
          - "Designed a self-serve customization system to allow clients to adjust lighting, materials, and furniture placement at runtime, without needing to use finite art team resources or rebuild/redeploy applications."
          - "Created a highly intuitive player navigation system for exploring the digital twins, requiring minimal setup per-project and providing an accessible, easy to learn experience for non-technical users."
          - "Optimized RAM and GPU usage, and reduced worst-case load times by 80% to ensure smooth operation in our AWS cloud environment."
      - company: "Gameloft Toronto"
        position: "Programmer"
        date:
        start_date: "2019-07"
        end_date: "2024-04"
        location:
        summary:
        highlights:
          - "Championed C++ data tracking integration for [Disney Magic Kingdoms](https://gamesbycarter.vercel.app/#dmk)' iOS version, collaborating with the Features team to measure usage of major gameplay and e-commerce features with minimal runtime overhead."
          - "Eliminated redundant and unnecessary data to optimize storage costs while still meeting our data clients' needs."
          - "Analyzed decade old legacy code to identify and resolve long-standing data tracking issues."
          - "Integrated and updated external libraries using Premake."
          - "Ported data tracking, UI, and anti-tampering code from a proprietary C++ game engine to Unity/C#."
      - company: "Humber College"
        position: "Peer Tutor"
        date:
        start_date: "2018-10"
        end_date: "2019-04"
        location:
        summary:
        highlights:
          - "Ran workshops and one-on-one tutoring sessions to help students understand math and programming concepts."
    education:
      - institution: "Humber College"
        area: "Game Programming (Advanced Diploma)"
        degree:
        grade:
        date:
        start_date: "2016"
        end_date: "2019"
        location:
        summary:
        highlights:
          - "Capstone Project: led a team of students in creating a custom C++ game engine and a [physics-based 3D platformer](https://gamesbycarter.vercel.app/#roof-toppers)."
    projects:
      - name: "GadgetEngine | C++ / OpenGL"
        date:
        start_date: "2022"
        end_date: "present"
        location:
        summary:
        highlights:
          - "Developed a [3D-capable game engine](https://github.com/ShikenNuggets/GadgetEngine) and [reusable C++ component library](https://github.com/ShikenNuggets/GadgetCore), featuring a custom OpenGL renderer, skeletal animation, and platform abstractions on top of SDL3."
          - "Used the engine to [publish a game](https://gamesbycarter.vercel.app/#whbg) for the GMTK Game Jam in 2024."
      - name: "Secret Identity | UE5 / C++"
        date:
        start_date: "2024-04"
        end_date: "2024-06"
        location:
        summary:
        highlights:
          - "Created a vertical slice for a [superhero action game](https://gamesbycarter.vercel.app/#secret-identity) in Unreal Engine 5.4, implementing flight mechanics with cape physics, randomized enemy encounters, and UMG-based UI."
    skills:
      - label: "Programming Languages"
        details: "C++, C#, Python"
      - label: "Game Engines"
        details: "Unreal Engine 5.3 - 5.7, Proprietary C++ Engines, Unity"
      - label: "Graphics and Math"
        details: "Linear Algebra, OpenGL, Skeletal Animation, Shaders (GLSL/HLSL)"
      - label: "Tooling"
        details: "CMake, Premake, Git, SVN, Visual Studio"
  sort_entries: "none"
